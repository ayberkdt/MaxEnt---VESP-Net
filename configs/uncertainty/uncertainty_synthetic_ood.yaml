# Stage 3C — calibrated posterior uncertainty over equivalent sources (OOD altitude).
#   python -m vesp.feasibility.training.uncertainty --config configs/uncertainty/uncertainty_synthetic_ood.yaml
#
# Noisy synthetic residual field, multi-shell sources, altitude-OOD split. Fits the exact
# linear-Gaussian posterior (mean == ridge) and validates the predictive error bars:
#   - calibration (does the 90% interval cover ~90% of held-out residuals?),
#   - does the EPISTEMIC std grow toward the held-out low-altitude band (the bottleneck)?
# This is MaxEnt repositioned as uncertainty quantification, the axis where it can add
# value over a bare ridge point estimate.
seed: 42
dtype: float64
device: cpu

body:
  R_body: 1.0
  normalize_positions: true

data:
  type: synthetic
  path:
  seed: 7
  synthetic_n_query: 1024
  synthetic_n_truth_sources: 96
  synthetic_query_radius_min: 1.01
  synthetic_query_radius_max: 2.00
  synthetic_truth_shell_radius: 0.72
  synthetic_noise_std: 1.0e-2

model:
  type: multishell
  shell_alphas: [0.50, 0.70, 0.86, 0.95]
  n_sources_per_shell: [128, 128, 128, 128]
  weight_mode: surface_area

kernel:
  eps: 0.0
  acceleration_sign: 1.0
  source_chunk_size: 512

solver:
  type: ridge
  ridge_method: augmented_lstsq
  lambda_l2: 1.0e-2
  column_normalize: true

loss:
  use_potential: false
  use_acceleration: true
  normalize_targets: false
  lambda_potential: 0.0
  lambda_acceleration: 1.0
  lambda_l2: 1.0e-2
  lambda_moment: 0.0
  lambda_dipole: 1.0
  shell_energy_weights: []

# Stage 3C hyperparameter selection: 'evidence' = empirical-Bayes (MacKay) optimization of
# the noise variance + prior precision (better calibrated). 'fixed' uses lambda_l2 above and
# a naive residual-variance noise estimate.
uncertainty:
  hyperparams: evidence
  # heteroscedastic altitude-dependent noise; on this OOD split the law must EXTRAPOLATE
  # into the unseen low band (train/val are mid-band only), so expect only partial low-band gain.
  noise_model: heteroscedastic

split:
  type: altitude_ood
  train_fraction: 0.8
  train_r_range: [1.05, 1.50]
  val_r_range: [1.05, 1.50]
  test_high_r_range: [1.50, 2.00]
  test_low_r_range: [1.01, 1.05]

output:
  output_dir: outputs
  run_name: uncertainty_synthetic_ood
  save_plots: false
