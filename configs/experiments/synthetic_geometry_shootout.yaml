# E8 — Source Geometry Shootout (synthetic).
#   python scripts/geometry_shootout.py --config configs/experiments/synthetic_geometry_shootout.yaml
#
# Tests the forward hypothesis from the E7 falsification: the low-altitude bottleneck is a
# source-GEOMETRY / representation problem (the model cannot capture the near-surface
# high-frequency residual), not a regularization problem. The synthetic truth is concentrated
# NEAR THE SURFACE (alpha=0.95, many sources -> high spatial frequency at low altitude), with an
# altitude-OOD split so test_low (1.01-1.05) measures held-out low-altitude generalization.
#
# Every geometry uses lambda_l2: auto (L-curve), so each is fairly regularized and
# regularization is not a confound. Geometries are config-only (shell radii + per-shell counts).
experiment:
  name: synthetic_geometry_shootout
  kind: sweep
  question_id: Q2
  question: "Does source geometry (esp. surface-near density) reduce held-out low-altitude error?"

base_config:
  seed: 42
  dtype: float64
  device: cpu

  body:
    R_body: 1.0
    normalize_positions: true

  data:
    type: synthetic
    path:
    seed: 7
    synthetic_n_query: 1024
    synthetic_n_truth_sources: 200
    synthetic_query_radius_min: 1.01
    synthetic_query_radius_max: 2.00
    synthetic_truth_shell_radius: 0.95
    synthetic_noise_std: 1.0e-3

  model:
    type: multishell
    shell_alphas: [0.70, 0.86, 0.95]
    n_sources_per_shell: [256, 256, 256]
    weight_mode: surface_area

  kernel:
    eps: 0.0
    acceleration_sign: 1.0
    source_chunk_size: 512

  solver:
    type: ridge
    ridge_method: augmented_lstsq
    lambda_l2: auto
    column_normalize: true

  loss:
    use_potential: true
    use_acceleration: true
    normalize_targets: false
    lambda_potential: 0.2
    lambda_acceleration: 1.0
    lambda_l2: auto
    lambda_moment: 1.0e-4
    lambda_dipole: 1.0
    shell_energy_weights: []

  split:
    type: altitude_ood
    train_fraction: 0.8
    train_r_range: [1.05, 1.50]
    val_r_range: [1.05, 1.50]
    test_high_r_range: [1.50, 2.00]
    test_low_r_range: [1.01, 1.05]

  evaluation:
    batch_size: 4096
    n_altitude_bins: 6

  output:
    save_plots: false

sweep:
  - name: single_086
    set: {model.shell_alphas: [0.86], model.n_sources_per_shell: [512]}
  - name: multi_baseline
    set: {model.shell_alphas: [0.70, 0.86, 0.95], model.n_sources_per_shell: [256, 256, 256]}
  - name: deep_only
    set: {model.shell_alphas: [0.50, 0.70], model.n_sources_per_shell: [384, 384]}
  - name: surface_dense
    set: {model.shell_alphas: [0.86, 0.95, 0.98], model.n_sources_per_shell: [256, 384, 512]}
  - name: multi_resolution
    set: {model.shell_alphas: [0.50, 0.70, 0.86, 0.95, 0.98], model.n_sources_per_shell: [64, 96, 128, 256, 384]}
  - name: denser_baseline
    set: {model.shell_alphas: [0.70, 0.86, 0.95], model.n_sources_per_shell: [512, 512, 512]}
