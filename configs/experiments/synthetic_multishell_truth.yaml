# E2 — Multi-shell cancellation test (answers Q3).
#   python scripts/run_experiment_suite.py --experiment E2
#
# A genuine multi-shell truth ([0.50, 0.70, 0.86]) is fitted with a matching
# multi-shell model under weak vs strong L2. Adjacent interior shells are nearly
# linearly dependent for an exterior field, so an under-regularized solve can fit the
# data with large opposing source strengths that nearly cancel.
#
# Watch shell_cancellation_ratio (sum_j RMS(field_j) / RMS(field_total)) and sigma_l2
# across the L2 sweep:
#   - weak L2  -> data may fit but shell_cancellation_ratio and sigma_l2 blow up (brittle).
#   - strong L2 -> cancellation drops toward ~1 at limited data-error cost.
# This experiment is central to deciding whether multi-shell VESP is stable.
experiment:
  name: synthetic_multishell_truth
  kind: sweep
  question_id: Q3
  question: "Does multi-shell fitting improve accuracy or create shell cancellation?"

base_config:
  seed: 42
  dtype: float64
  device: cpu

  body:
    R_body: 1.0
    normalize_positions: true

  data:
    type: synthetic
    path:
    seed: 7
    synthetic_n_query: 768
    synthetic_truth_shell_radii: [0.50, 0.70, 0.86]
    synthetic_n_truth_sources: [96, 128, 96]
    synthetic_query_radius_min: 1.05
    synthetic_query_radius_max: 1.60
    synthetic_noise_std: 0.0

  model:
    type: multishell
    shell_alphas: [0.50, 0.70, 0.86]
    n_sources_per_shell: [128, 128, 128]
    weight_mode: surface_area

  kernel:
    eps: 0.0
    acceleration_sign: 1.0
    source_chunk_size: 512

  solver:
    type: ridge
    ridge_method: augmented_lstsq
    lambda_l2: 1.0e-8
    column_normalize: true

  loss:
    use_potential: true
    use_acceleration: true
    normalize_targets: false
    lambda_potential: 0.2
    lambda_acceleration: 1.0
    lambda_l2: 1.0e-8
    lambda_moment: 1.0e-4
    lambda_dipole: 1.0
    shell_energy_weights: []

  split:
    type: random
    train_fraction: 0.8

  evaluation:
    batch_size: 4096
    n_altitude_bins: 6

  output:
    save_plots: false

sweep:
  coupled_grid:
    - paths: ["loss.lambda_l2", "solver.lambda_l2"]
      values: [1.0e-8, 1.0e-4, 1.0e-2, 1.0, 30.0]
