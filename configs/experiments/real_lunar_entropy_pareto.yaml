# E5 (part 3) — Real lunar entropy Pareto sweep (contributes to Q5/Q6).
#   python scripts/run_experiment_suite.py --config configs/experiments/real_lunar_entropy_pareto.yaml
#
# Deterministic Stage 3A entropy regularization on the GRAIL-derived band-limited lunar
# residual field, swept over entropy_weight x entropy_mode, compared against the ridge
# baseline (entropy_weight = 0).
#
# L2 NOTE: this is the CONSERVATIVE L2 BASELINE family (lambda_l2 = 30, matching
# real_lunar_ridge_baseline.yaml). Entropy is tested ON TOP of an already de-collapsed
# fit, which is the scientifically honest "does MaxEnt add value beyond ridge" comparison.
# An intentionally under-regularized variant is kept separately as
# configs/real_lunar/maxent_pareto_real_lunar_lowl2_stress_test.yaml (clearly marked stress test).
#
# Headline question: at entropy_weight = 0 the data fit must match the ridge baseline; a
# useful MaxEnt regime exists only if entropy improves source-distribution health
# (shell_energy_balance_entropy_nats, shell_cancellation_ratio, top_5pct, source_entropy)
# without an unacceptable relative_acceleration_rmse increase.
experiment:
  name: real_lunar_entropy_pareto
  kind: sweep
  question_id: Q5
  question: "Does entropy regularization improve source distribution health at acceptable data-error cost (real lunar)?"

base_config:
  seed: 42
  device: cpu
  dtype: float64

  body:
    R_body: 1.0
    normalize_positions: true
    physical_R_body: 1738.0
    physical_R_body_units: km
    position_units: normalized
    potential_units: km^2/s^2
    acceleration_units: km/s^2

  data:
    type: csv
    path: data/lunar_grail_gl0420a_L60_residual.csv
    train_fraction: 0.8
    seed: 42

  model:
    type: multishell
    shell_alphas: [0.70, 0.86, 0.95]
    n_sources_per_shell: [384, 512, 384]
    weight_mode: surface_area

  kernel:
    eps: 0.0
    acceleration_sign: 1.0
    source_chunk_size: 1024

  # Conservative L2 baseline (NOT under-regularized).
  solver:
    type: maxent
    ridge_method: augmented_lstsq
    lambda_l2: 30.0
    column_normalize: true

  loss:
    use_potential: true
    use_acceleration: true
    normalize_targets: true
    potential_scale: auto
    acceleration_scale: auto
    lambda_potential: 0.2
    lambda_acceleration: 1.0
    lambda_l2: 30.0
    lambda_moment: 1.0e-4
    lambda_dipole: 1.0
    shell_energy_weights: []
    entropy_weight: 0.0
    entropy_mode: shell_balance

  maxent:
    optimizer: lbfgs
    max_iter: 500
    warm_start: true

  split:
    type: random
    radius_units: normalized
    train_fraction: 0.8

  evaluation:
    batch_size: 4096
    n_altitude_bins: 6

  output:
    save_plots: false

sweep:
  coupled_grid:
    - paths: ["loss.entropy_weight"]
      values: [0.0, 1.0e-3, 1.0e-2, 1.0e-1, 1.0, 3.0, 10.0]
    - paths: ["loss.entropy_mode"]
      values: ["shell_balance", "positive_negative"]
