# E4 — Entropy Pareto sweep (answers Q5).
#   python scripts/run_experiment_suite.py --experiment E4
#
# Same multi-shell geometry, data split and target scaling as the L2 sweep, but with a
# FIXED, conservative L2 baseline (lambda_l2 = 1.0). entropy_weight is swept against the
# ridge baseline (entropy_weight = 0) across all four entropy modes. The question is
# whether deterministic entropy regularization adds value BEYOND L2.
#
# L2 NOTE: this is the "conservative L2 baseline" family. L2 is held fixed at 1.0 so the
# entropy term is isolated on top of an already well-conditioned fit. (To test whether
# entropy can substitute for L2 under deliberate under-regularization, see the clearly
# named *_stress_test config; that is not the default scientific comparison.)
#
# Expected: entropy_weight = 0 matches the ridge baseline data fit; increasing entropy
# increases source_entropy_nats. A useful MaxEnt regime exists ONLY if entropy improves
# source-distribution health (cancellation, concentration, shell balance) without an
# unacceptable RMSE increase. If entropy only worsens RMSE without improving diagnostics,
# the suite report should say so honestly.
experiment:
  name: synthetic_entropy_pareto
  kind: sweep
  question_id: Q5
  question: "Does entropy regularization improve source distribution health at acceptable data-error cost?"

base_config:
  seed: 42
  dtype: float64
  device: cpu

  body:
    R_body: 1.0
    normalize_positions: true

  data:
    type: synthetic
    path:
    seed: 7
    synthetic_n_query: 512
    synthetic_n_truth_sources: 96
    synthetic_query_radius_min: 1.05
    synthetic_query_radius_max: 1.60
    synthetic_truth_shell_radius: 0.72
    synthetic_noise_std: 0.0

  model:
    type: multishell
    shell_alphas: [0.50, 0.70, 0.86, 0.95]
    n_sources_per_shell: [128, 128, 128, 128]
    weight_mode: surface_area

  kernel:
    eps: 0.0
    acceleration_sign: 1.0
    source_chunk_size: 512

  # Conservative L2 baseline (NOT under-regularized). Entropy is tested on top of this.
  solver:
    type: maxent
    ridge_method: augmented_lstsq
    lambda_l2: 1.0
    column_normalize: true

  loss:
    use_potential: true
    use_acceleration: true
    normalize_targets: false
    lambda_potential: 0.2
    lambda_acceleration: 1.0
    lambda_l2: 1.0
    lambda_moment: 1.0e-4
    lambda_dipole: 1.0
    shell_energy_weights: []
    entropy_weight: 0.0
    entropy_mode: positive_negative

  maxent:
    optimizer: lbfgs
    max_iter: 300
    warm_start: true

  split:
    type: random
    train_fraction: 0.8

  evaluation:
    batch_size: 4096
    n_altitude_bins: 6

  output:
    save_plots: false

sweep:
  coupled_grid:
    - paths: ["loss.entropy_weight"]
      values: [0.0, 1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1, 1.0, 3.0, 10.0]
    - paths: ["loss.entropy_mode"]
      values: ["positive_negative", "abs", "relative_uniform", "shell_balance"]
