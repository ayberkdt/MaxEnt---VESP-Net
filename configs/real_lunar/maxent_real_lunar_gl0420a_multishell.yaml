# Stage 3A: single deterministic MaxEnt run on the real lunar multi-shell case.
#   python -m vesp.feasibility.training.train --config configs/real_lunar/maxent_real_lunar_gl0420a_multishell.yaml
#
# This keeps the ridge solution as a warm start / baseline and adds a maximum-entropy
# term over the source strengths. entropy_mode=shell_balance maximizes the entropy of
# the per-shell energy distribution, directly resisting the shell-energy collapse that
# the deterministic ridge baseline exhibits on this dataset.
#
# IMPORTANT: the entropy_weight below is a single operating point. The principled way
# to choose it is the data-error vs entropy Pareto sweep:
#   python -m vesp.feasibility.training.maxent_pareto --config configs/real_lunar/maxent_pareto_real_lunar.yaml
#
# L2 CONSISTENCY (fixed): lambda_l2 is the CONSERVATIVE BASELINE value 30.0, matching the
# ridge default (configs/real_lunar/real_lunar_gl0420a_multishell.yaml). Earlier revisions of this
# file used a known under-regularized lambda_l2 = 1e-5, which made the MaxEnt run and the
# ridge baseline incomparable (the ridge baseline had already removed the brittle
# inter-shell near-cancellation that 1e-5 leaves in). Entropy is now tested ON TOP of a
# de-collapsed fit. The under-regularized behavior is preserved, clearly labelled, in
# configs/real_lunar/maxent_pareto_real_lunar_lowl2_stress_test.yaml.
seed: 42
device: cpu
dtype: float64

body:
  R_body: 1.0
  normalize_positions: true
  physical_R_body: 1738.0
  physical_R_body_units: km
  position_units: normalized
  potential_units: km^2/s^2
  acceleration_units: km/s^2

data:
  type: csv
  path: data/lunar_grail_gl0420a_L60_residual.csv
  train_fraction: 0.8
  seed: 42

model:
  type: multishell
  shell_alphas: [0.70, 0.86, 0.95]
  n_sources_per_shell: [384, 512, 384]
  weight_mode: surface_area

kernel:
  eps: 0.0
  acceleration_sign: 1.0
  source_chunk_size: 1024

solver:
  type: maxent
  ridge_method: augmented_lstsq
  lambda_l2: 30.0
  column_normalize: true

loss:
  use_potential: true
  use_acceleration: true
  normalize_targets: true
  potential_scale: auto
  acceleration_scale: auto
  lambda_potential: 0.2
  lambda_acceleration: 1.0
  lambda_l2: 30.0
  lambda_moment: 1.0e-4
  lambda_dipole: 1.0
  shell_energy_weights: []
  entropy_weight: 0.1
  entropy_mode: shell_balance

maxent:
  optimizer: lbfgs
  max_iter: 500
  warm_start: true

split:
  type: random
  train_fraction: 0.8

evaluation:
  batch_size: 4096
  n_altitude_bins: 6

output:
  output_dir: outputs
  run_name: maxent_real_lunar_gl0420a_multishell
  save_plots: false
